# Staging stack — Traefik routes:
#   staging.${DOMAIN}/api/*  → backend
#   staging.${DOMAIN}/*      → frontend
#
# Prerequisite: a Docker network named ${TRAEFIK_NETWORK} (default: web)
# already exists and Traefik is attached to it.
#
# Usage:
#   docker compose -f docker-compose.staging.yml --env-file .env.staging up -d --build

services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    image: monnscale/backend:staging
    container_name: monnscale-backend-staging
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-900}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-2592000}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-opus-4-7}
      CORS_ORIGINS: https://staging.${DOMAIN}
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-web}"
      # Router — match /api and strip it (Nest already prefixes /api/v1 internally,
      # so we keep the prefix; remove the StripPrefix middleware below if you want).
      - "traefik.http.routers.monnscale-api.rule=Host(`staging.${DOMAIN}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.monnscale-api.entrypoints=websecure"
      - "traefik.http.routers.monnscale-api.tls=true"
      - "traefik.http.routers.monnscale-api.tls.certresolver=${TRAEFIK_CERTRESOLVER:-letsencrypt}"
      - "traefik.http.routers.monnscale-api.priority=100"
      - "traefik.http.services.monnscale-api.loadbalancer.server.port=3000"

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        # Empty → axios uses relative URL → Traefik routes /api to backend
        VITE_API_URL: ""
    image: monnscale/frontend:staging
    container_name: monnscale-frontend-staging
    restart: unless-stopped
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-web}"
      - "traefik.http.routers.monnscale-web.rule=Host(`staging.${DOMAIN}`)"
      - "traefik.http.routers.monnscale-web.entrypoints=websecure"
      - "traefik.http.routers.monnscale-web.tls=true"
      - "traefik.http.routers.monnscale-web.tls.certresolver=${TRAEFIK_CERTRESOLVER:-letsencrypt}"
      - "traefik.http.routers.monnscale-web.priority=10"
      - "traefik.http.services.monnscale-web.loadbalancer.server.port=80"

networks:
  traefik:
    name: ${TRAEFIK_NETWORK:-web}
    external: true
